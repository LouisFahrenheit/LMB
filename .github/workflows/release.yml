# Сборка Windows EXE и публикация zip на GitHub Releases при push тега v*
# Ручная проверка: Actions → Release → Run workflow (артефакт без релиза)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      # После перехода официальных actions на Node 24 предупреждение о Node 20 пропадает
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # PyInstaller не берём из requirements-build.txt — на CI файл часто отсутствует в коммите;
      # локально можно по-прежнему использовать requirements-build.txt вручную.
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0" "pyinstaller-hooks-contrib>=2024.0"

      # LocalMusicBot.spec → dist/LMB.exe → dist/Local_Music_Bot_<APP_VERSION>.zip (логика как в build_release.py, без отдельного скрипта на CI)
      - name: Сборка и архив (версия из APP_VERSION)
        id: pack
        shell: pwsh
        run: |
          if (-not (Test-Path 'icon.ico')) {
            Write-Error 'В корне репозитория должен быть icon.ico.'
            exit 1
          }
          if (-not (Test-Path 'LocalMusicBot.spec')) {
            Write-Host '::error::Нет LocalMusicBot.spec в корне репозитория.'
            Get-ChildItem -Name
            exit 1
          }
          if (-not (Test-Path 'Local_Music_Bot.pyw')) {
            Write-Error 'Нет Local_Music_Bot.pyw в корне репозитория.'
            exit 1
          }

          $raw = Get-Content -Raw -Path 'Local_Music_Bot.pyw' -Encoding UTF8
          if ($raw -notmatch '(?m)^APP_VERSION\s*=\s*[''"]([^''"]+)[''"]') {
            Write-Error 'В Local_Music_Bot.pyw не найдена строка APP_VERSION = "..."'
            exit 1
          }
          $version = $Matches[1].Trim()
          $safe = $version -replace '[<>:"/\\|?*]', '_'
          $folder = "Local_Music_Bot_$safe"
          $zipName = "$folder.zip"

          python -m PyInstaller --noconfirm --clean LocalMusicBot.spec
          if (-not (Test-Path 'dist\LMB.exe')) {
            Write-Error 'PyInstaller не создал dist\LMB.exe'
            exit 1
          }

          $stageRoot = 'dist\_ci_zip_stage'
          if (Test-Path $stageRoot) { Remove-Item -Recurse -Force $stageRoot }
          $inner = Join-Path $stageRoot $folder
          New-Item -ItemType Directory -Force -Path $inner | Out-Null
          Copy-Item 'dist\LMB.exe' (Join-Path $inner 'LMB.exe')
          $zipPath = Join-Path 'dist' $zipName
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path $inner -DestinationPath $zipPath -CompressionLevel Optimal
          Remove-Item -Recurse -Force $stageRoot

          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Загрузить артефакт (без тега)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.pack.outputs.ZIP_NAME }}
          path: dist/${{ steps.pack.outputs.ZIP_NAME }}

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.pack.outputs.ZIP_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
